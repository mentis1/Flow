<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flow</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Flow" />
</head>
<body>

  <!-- ── LOGIN VIEW ───────────────────────────────────────── -->
  <div id="loginView" class="login-overlay hidden">
    <div class="login-card">
      <div class="login-brand">
        <img src="icon.png" alt="Flow" style="width:24px;height:24px;border-radius:4px;display:block;" />
        <span class="brand-name">Flow</span>
      </div>
      <h2 class="login-title">Bienvenido</h2>
      <p class="login-subtitle">Inicia sesión para acceder a tus proyectos</p>

      <div id="loginError" class="login-error hidden"></div>

      <form id="loginForm" class="login-form" autocomplete="on">
        <label>
          <span>Correo electrónico</span>
          <input type="email" id="loginEmail" placeholder="tu@email.com" required />
        </label>
        <label>
          <span>Contraseña</span>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </label>
        <button type="submit" class="btn-primary btn-full" id="loginBtn">Iniciar sesión</button>
      </form>

      <div class="login-divider"><span>o</span></div>

      <form id="registerForm" class="login-form hidden" autocomplete="on">
        <label>
          <span>Correo electrónico</span>
          <input type="email" id="registerEmail" placeholder="tu@email.com" required />
        </label>
        <label>
          <span>Contraseña</span>
          <input type="password" id="registerPassword" placeholder="Mínimo 6 caracteres" required />
        </label>
        <button type="submit" class="btn-primary btn-full" id="registerBtn">Crear cuenta</button>
      </form>

      <div class="login-toggle">
        <span id="toggleLoginText">¿No tienes cuenta?</span>
        <button id="toggleLoginBtn" class="btn-link">Crear cuenta</button>
      </div>
    </div>
  </div>

  <!-- ── APP SHELL ─────────────────────────────────────────── -->
  <div id="appShell" class="shell hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
      <img src="icon.png" alt="Flow" style="width:24px;height:24px;border-radius:4px;display:block;" />
        <span class="brand-name">Flow</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="dashboard">
          <span class= </span> Mis Proyectos
        </button>
      </nav>
      <div class="sidebar-section-label">Mis proyectos</div>
      <nav id="sidebarProjects"></nav>
      <button class="sidebar-exportall" id="btnExportAll" title="Exportar todas las tareas">
        <span style="font-size:13px;margin-right:6px">↑</span> Exportar todo
      </button>
      <button class="sidebar-add" id="sidebarAddBtn">
        <span style="font-size:15px;margin-right:6px">+</span> Nuevo proyecto
      </button>
      <button class="sidebar-logout" id="logoutBtn" title="Cerrar sesión">
        <span class="nav-icon">↩</span> Cerrar sesión
      </button>
    </aside>

    <!-- Content -->
    <main class="content" id="content">
      <!-- Dashboard -->
      <section id="dashboardView">
        <div class="view-title" id="dashTitle">Mis proyectos</div>
        <div class="view-subtitle" id="dashSubtitle"></div>
        <div class="project-grid" id="projectGrid"></div>
      </section>

      <!-- Project view -->
      <section id="projectView" class="hidden">
        <button class="btn-back" id="btnBack">← Volver</button>
        <div class="project-view-header">
          <div class="project-view-meta">
            <div class="project-emoji-large" id="pvEmoji"></div>
            <div>
              <div class="project-view-title" id="pvTitle"></div>
              <div class="project-view-desc" id="pvDesc"></div>
            </div>
          </div>
          <div class="project-header-actions">
            <button class="btn-icon-action" id="btnEditProject" title="Editar">✎</button>
            <button class="btn-icon-action btn-danger" id="btnDeleteProject" title="Eliminar">✕</button>
          </div>
        </div>

        <div class="progress-section">
          <span class="progress-label" id="pvProgressLabel">0%</span>
          <div class="progress-slider-wrap">
            <div class="progress-slider-fill" id="pvProgressFill" style="width:0%"></div>
            <input type="range" min="0" max="100" value="0" class="progress-slider" id="pvProgressSlider" />
          </div>
          <span class="progress-value" id="pvProgressValue">Avance</span>
        </div>

        <div class="project-columns">
          <div class="col-left">
            <div class="col-header">Pasos del proyecto</div>
            <form class="step-add-form" id="stepAddForm">
              <input type="text" id="stepInput" placeholder="Nuevo paso…" />
              <button type="submit" class="step-add-btn">Añadir</button>
            </form>
            <div class="steps-list" id="stepsList"></div>
          </div>
          <div class="col-right">
            <div class="col-header">Acciones a continuación</div>
            <form class="tomorrow-add-form" id="tomorrowAddForm">
              <input type="text" id="tomorrowInput" placeholder="Acción para mañana…" />
              <button type="submit" class="tomorrow-add-btn">Añadir</button>
            </form>
            <div class="tomorrow-list" id="tomorrowList"></div>
            <div class="export-bar">
              <button class="btn-export" id="btnExport">Exportar mi día</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- ── MODAL: Nuevo / Editar proyecto ────────────────────── -->
  <div class="modal-overlay hidden" id="projectModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Nuevo proyecto</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <form id="projectForm">
        <label>
          Nombre del proyecto
          <input type="text" id="fieldName" placeholder="Ej. Rediseño web" required maxlength="60" />
        </label>
        <label>
          Descripción (opcional)
          <input type="text" id="fieldDesc" placeholder="Breve descripción…" maxlength="100" />
        </label>
        <label>
          Emoji
          <div class="color-row" id="emojiRow"></div>
        </label>
        <label>
          Color
          <div class="color-row" id="colorRow"></div>
        </label>
        <div class="modal-actions">
          <button type="submit" class="btn-primary" id="formSubmitBtn">Crear proyecto</button>
          <button type="button" class="btn-ghost" id="modalCancel">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Toast ─────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── FAB ───────────────────────────────────────────────── -->
  <div class="fab-wrap" id="fabWrap">
    <button class="fab" id="fabBtn" title="Nuevo proyecto">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
</html>
